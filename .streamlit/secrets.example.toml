# Copy this file to .streamlit/secrets.toml and fill in the real values.
# The real secrets.toml file is git-ignored and must never be committed.

[auth]
# Google must redirect back to Streamlit after the browser login completes.
# Local Streamlit apps usually run on port 8501; deployed apps need their own
# public base URL with the same /oauth2callback path.
redirect_uri = "http://localhost:8501/oauth2callback"

# Streamlit uses this to sign the browser session cookie it creates after
# login. Use a long random value here, not a password you reuse elsewhere.
cookie_secret = "replace-with-a-long-random-secret"

[auth.google]
# These two values come from the Google Cloud OAuth client you create for this
# app. They identify this Streamlit app to Google during the OIDC login flow.
client_id = "replace-with-google-oauth-client-id"
client_secret = "replace-with-google-oauth-client-secret"

# Google's public OIDC metadata endpoint. Streamlit reads this to discover the
# login, token, and key endpoints it should use.
server_metadata_url = "https://accounts.google.com/.well-known/openid-configuration"
