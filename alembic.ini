[alembic]
# Root-level migrations keep Alembic's generated files outside the app package
# while still letting env.py import backend.storage.models for metadata.
script_location = migrations
# Make repo-root imports work when Alembic is launched as `python -m alembic`.
prepend_sys_path = .
path_separator = os
# env.py replaces this with DATABASE_URL at runtime. This fallback keeps Alembic
# tooling happy before env.py runs and documents the local default.
sqlalchemy.url = sqlite:///data/scanner.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
