name: Quality and security

on:
  pull_request:
  push:
    branches:
      - main

# Least privilege: this workflow only reads the repo (checkout + run tools), so we
# pin the GITHUB_TOKEN to read-only here instead of inheriting broader defaults.
permissions:
  contents: read

jobs:
  verify:
    name: Python ${{ matrix.python-version }} quality and supply-chain checks
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        # 3.11 is the deployment target; 3.12 catches forward-compatibility
        # drift before an interpreter upgrade is forced on us.
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install pinned direct dependencies
        run: |
          python -m pip install --upgrade pip
          # `requirements.txt` lists what to install; `constraints.txt` pins
          # the direct versions this repo has verified together. Keeping the
          # two concepts separate makes dependency updates deliberate.
          python -m pip install -r requirements.txt -r requirements-dev.txt -c constraints.txt

      - name: Validate pre-commit configuration
        run: python -m pre_commit validate-config .pre-commit-config.yaml

      - name: Run tests with coverage gate
        run: |
          # The floor sits two points under the measured 86% so routine PRs
          # don't fight the gate, while a large untested addition still fails.
          python -m pytest -q --cov=backend --cov=screeners --cov=ui --cov-fail-under=84

      - name: Compile importable Python files
        run: python -m compileall -q app.py backend screeners ui tests

      - name: Run Ruff static checks
        run: python -m ruff check app.py backend screeners ui Dependencies tests

      - name: Run mypy type checks
        run: |
          # Scope and strictness live in pyproject.toml ([tool.mypy]). Tests
          # are deliberately excluded from this first adoption pass; expanding
          # coverage there is a documented follow-up.
          python -m mypy

      - name: Run Bandit security checks
        run: |
          # Bandit catches common Python security footguns, such as unsafe
          # subprocess calls or insecure temp-file patterns, before they reach
          # a branch reviewers have to reason through manually.
          python -m bandit -r app.py backend screeners ui Dependencies -q

      - name: Audit pinned dependency advisories
        run: |
          # Audit the exact direct versions installed above. Auditing the
          # unconstrained requirements would resolve newer packages and could
          # miss a vulnerability in the versions CI actually tested.
          python -m pip_audit -r constraints.txt

  # Verify the deployment image actually assembles. Developer machines may not
  # have Docker installed, so this is the gate that catches a broken Dockerfile or
  # an undeclared system/runtime dependency before it reaches a deployment.
  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build deployment image
        run: docker build --tag streamlit-scanner-app:ci .

      - name: Copy Compose environment template
        run: cp .env.example .env

      - name: Copy Streamlit secrets template
        run: cp .streamlit/secrets.example.toml .streamlit/secrets.toml

      - name: Validate Compose configuration
        run: docker compose config

      - name: Smoke-test Compose stack
        run: docker compose up --build --wait --wait-timeout 180

      - name: Tear down Compose stack
        if: always()
        run: docker compose down --volumes --remove-orphans
