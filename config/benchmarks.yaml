# Verified Dhan IDX_I benchmark index instruments (VALID-002B).
#
# Each entry maps a scan `universe_key` to the index it is benchmarked against.
# `security_id` is the Dhan IDX_I instrument id, RESOLVED FROM the Dhan instrument
# master (not guessed). See
# docs/architecture/components/validation.md -> "Verifying / updating benchmark IDs"
# for how to re-derive these with `resolve_index_security_ids(...)`.
#
# A blank or missing `security_id` keeps the graceful-null behaviour: stock returns
# still compute, but benchmark/excess returns stay null for that universe.
